name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck bin/*.sh bin/backends/*.sh tests/*.sh

  tests:
    name: Behavior tests
    runs-on: ubuntu-latest
    # The suite should finish in ~2-3 minutes; this generous cap fails loudly on a
    # hung watcher or tmux test instead of riding GitHub's 360-minute default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require tmux for e2e tests
        run: |
          set -eu
          command -v tmux >/dev/null || {
            echo "::error::tmux is required for real afk injection e2e coverage"
            exit 1
          }
          tmux -V
      - run: |
          set -eu
          for test_script in tests/*.test.sh; do
            "$test_script"
          done

  macos-bash32:
    name: macOS stock bash 3.2
    # The captain's macOS runs stock /bin/bash 3.2.57, but the jobs above use
    # ubuntu-latest (bash 5). Every bash-3.2-specific break shipped undetected for
    # exactly that reason: a heredoc inside `$(...)` whose apostrophe crashes the
    # pre-POSIX scanner, an empty array under `set -u`, and a locale-dependent
    # `[a-z]` range that matches uppercase. This leg exercises the toolbelt and the
    # full behavior suite under the real stock bash 3.2 so that class fails CI.
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Assert stock /bin/bash is 3.2
        run: |
          set -eu
          /bin/bash --version | head -1
          major=$(/bin/bash -c 'echo "${BASH_VERSINFO[0]}"')
          [ "$major" = 3 ] || { echo "::error::expected stock /bin/bash major version 3 (macOS 3.2), got $major"; exit 1; }
      - name: Syntax-check every script under bash 3.2
        run: |
          set -eu
          for script in bin/*.sh bin/backends/*.sh tests/*.sh; do
            /bin/bash -n "$script"
          done
      - name: Ensure tmux is available for the e2e tests
        run: |
          set -eu
          command -v tmux >/dev/null || brew install tmux
          tmux -V
      - name: Run behavior tests under stock bash 3.2
        run: |
          set -eu
          # Put /bin first so each test's `#!/usr/bin/env bash` and every script it
          # spawns resolve to the stock 3.2 interpreter, exercising the same bash the
          # captain's macOS machine runs. Other tools (git, tmux) stay on PATH after.
          export PATH="/bin:$PATH"
          for test_script in tests/*.test.sh; do
            "$test_script"
          done

  invariants:
    name: Repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Symlinks must stay intact
        run: |
          set -eu
          [ "$(readlink CLAUDE.md)" = "AGENTS.md" ] || { echo "::error::CLAUDE.md must be a symlink to AGENTS.md"; exit 1; }
          [ "$(readlink .claude/skills)" = "../.agents/skills" ] || { echo "::error::.claude/skills must be a symlink to ../.agents/skills"; exit 1; }
      - name: Personal fleet paths must not be tracked
        run: |
          set -eu
          tracked=$(git ls-files -- data state config projects .no-mistakes)
          if [ -n "$tracked" ]; then
            echo "::error::Personal fleet paths are tracked in git:"
            printf '%s\n' "$tracked"
            exit 1
          fi
